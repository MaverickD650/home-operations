---
# yaml-language-server: $schema=https://schema.maverickd650.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: stash-1
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: common
    namespace: system
  driftDetection:
    mode: enabled
  upgrade:
    cleanupOnFail: true
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      stash:
        containers:
          app:
            image:
              repository: stashapp/stash
              tag: v0.31.1@sha256:df744af5a0c976e2ec671052ecc1f8a9aa757fa12b8f9930b59910b7295f0da6
            env:
              STASH_STASH: /data
              STASH_BLOBS_PATH: /config/blobs
              STASH_BLOBS_STORAGE: FILESYSTEM
              STASH_GENERATED: /generated
              STASH_METADATA: /metadata
              STASH_CACHE: /cache
              STASH_PLUGINS_PATH: /config/plugins
              STASH_SCRAPERS_PATH: /config/scrapers
              STASH_CONFIG_FILE: /config/config.yml
              STASH_PORT: &port 9999
              USER: "568"
              HOME: /config
              TZ: Europe/London
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 20m
                memory: 512Mi
              limits:
                memory: 2Gi
    persistence:
      config:
        existingClaim: "stash-1-config"
        globalMounts:
        - path: /config
          subPath: config
        - path: /config/blobs
          subPath: blobs
        - path: /generated
          subPath: generated
        - path: /metadata
          subPath: metadata
      store:
        type: nfs
        server: 192.168.50.118
        path: /mnt/media/stash-rm
      tmpfs:
        type: emptyDir
        advancedMounts:
          stash:
            app:
            - path: /cache
              subPath: cache
            - path: /root/.stash/logs
              subPath: logs
            - path: /tmp
              subPath: tmp
    route:
      app:
        hostnames: ["stash-1.{$SECRET_DOMAIN}"]
        parentRefs:
        - name: envoy-internal
          namespace: network
    service:
      app:
        ports:
          http:
            port: *port
