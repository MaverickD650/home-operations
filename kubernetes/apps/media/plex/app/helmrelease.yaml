---
# yaml-language-server: $schema=https://schema.maverickd650.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  chartRef:
    kind: OCIRepository
    name: plex
  interval: 1h
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      plex:
        replicas: 1
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/plex
              tag: 1.43.1.10576@sha256:f2e33a01419c0b11f1e9d09674418151f7f6dec45a8d61a74b999abfad2115b6
            env:
              ALLOWED_NETWORKS: "172.16.0.0/12,10.0.0.0/8,192.168.0.0/16"
              TZ: Europe/London
              PLEX_ADVERTISE_URL: "https://plex.${SECRET_DOMAIN},https://plex.${SECRET_DOMAIN}:32400,http://192.168.20.3:32400"
    service:
      app:
        type: LoadBalancer
        controller: plex
        annotations:
          lbipam.cill.io/ips: 192.168.20.3
        ports:
          http:
            enabled: true
            port: 32400
            protocol: TCP
            targetPort: 32400
    route:
      app:
        hostnames:
          - "plex.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: plex-config
      stash1:
        type: nfs
        path: /mnt/media/stash/misc
        globalMounts:
          - path: /data/stash1
        server: 192.168.50.118
      stash2:
        type: nfs
        path: /mnt/media/stash-rm
        globalMounts:
          - path: /data/stash2
        server: 192.168.50.118
      media:
        type: nfs
        path: /mnt/media/mediashare
        globalMounts:
          - path: /data/media
        server: 192.168.50.118
