---
apiVersion: v1
kind: Service
metadata:
  name: haos
spec:
  ports:
    - name: http
      protocol: TCP
      port: 8123
      targetPort: 8123
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: haos
  labels:
    kubernetes.io/service-name: haos
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 8123
endpoints:
  - addresses:
      - "${HAOSIP}"
    conditions:
      ready: true
      serving: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: haos
  annotations:
    external-dns.alpha.kubernetes.io/hostname: &host ha.${SECRET_DOMAIN}
spec:
  hostnames:
    - *host
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: haos
          namespace: network
          port: 8123
