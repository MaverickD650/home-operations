---
# yaml-language-server: $schema=https://schema.maverickd650.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: feedcord-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: feedcord-secret
  data:
    - secretKey: DISCORD_RELEASES_WEBHOOK
      remoteRef:
        key: FEEDCORD_DISCORD_RELEASES_WEBHOOK
    - secretKey: DISCORD_HOBBIES_WEBHOOK
      remoteRef:
        key: FEEDCORD_DISCORD_HOBBIES_WEBHOOK
    - secretKey: DISCORD_TECH_WEBHOOK
      remoteRef:
        key: FEEDCORD_DISCORD_TECH_WEBHOOK
---
# yaml-language-server: $schema=https://schema.maverickd650.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-feedcord
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: ghcr-feedcord
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: '{"auths":{"ghcr.io":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}'
  data:
    - secretKey: username
      remoteRef:
        key: ghcr-username
    - secretKey: password
      remoteRef:
        key: ghcr-pat
